# Local PostgreSQL + plv8 for development and CI. Pulls the prebuilt
# multi-arch image from GHCR. To compile plv8 from source instead (the
# Dockerfile is the recipe the image is built from), add the build override:
#   docker compose -f docker/compose.yml -f docker/compose.build.yml up -d --build
services:
  db:
    image: ghcr.io/exatodigital-legacy/postgres-plv8:17-3.2.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    shm_size: 1g
    # bge-m3 needs ~2.5GB free per session on top of shared buffers
    deploy:
      resources:
        limits:
          memory: 6g
