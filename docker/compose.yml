# Local PostgreSQL + plv8 for development and CI.
# Pulls the prebuilt multi-arch image from GHCR when available; `docker
# compose up --build` compiles the same thing from source via the Dockerfile
# (any PostgreSQL >= 15 with plv8 >= 3.1 works).
services:
  db:
    image: ghcr.io/exatodigital-legacy/postgres-plv8:17-3.2.4
    build: .
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    shm_size: 1g
    # bge-m3 needs ~2.5GB free per session on top of shared buffers
    deploy:
      resources:
        limits:
          memory: 6g
