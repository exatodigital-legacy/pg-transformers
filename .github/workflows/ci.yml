name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: build every registered model
        run: kernel/build.sh

  # Full cycle on the smallest model: build a plv8 Postgres, convert
  # all-MiniLM from HF, load, and require exact parity + edge cases.
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: start Postgres + plv8
        # pull the prebuilt GHCR image; fall back to building plv8 from
        # source if it isn't available (first run, or after a version bump)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose -f docker/compose.yml up -d --wait \
            || docker compose -f docker/compose.yml -f docker/compose.build.yml up -d --wait --build
      - name: build, export, load
        run: |
          kernel/build.sh all-minilm all-minilm-int8
          pip install -e '.[export,test]' --extra-index-url https://download.pytorch.org/whl/cpu
          pg-transformers export all-minilm all-minilm-int8
          pg-transformers load all-minilm all-minilm-int8
          pg-transformers probe
      - name: parity + edge cases
        env:
          PGT_MODELS: all-minilm,all-minilm-int8
        run: pytest tests/ -v
